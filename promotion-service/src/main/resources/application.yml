server:
  port: 8066
  servlet:
    context-path: /promotion-service

spring:
  application:
    name: promotion-service
  datasource:
    url: jdbc:postgresql://localhost:5432/promotion_db
    username: admin
    password: admin123
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
  kafka:
    bootstrap-servers: localhost:9094
    producer:
      acks: all
      retries: 1
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        enable.idempotence: true
        max.in.fight.request.per.connection: 5

springdoc:
  swagger-ui:
    path: /swagger-ui.html
open:
  api:
    version: v1.0.0
    serverUrl: http://localhost:8888/api/v1/promotion-service
    serverName: Test-promotionService

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/
    instance:
      prefer-ip-address: true
      ip-address: 172.28.48.1

